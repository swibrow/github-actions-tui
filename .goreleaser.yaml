version: 2

builds:
  - main: ./cmd/gha
    binary: gha
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: swibrow
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: gha
    homepage: https://github.com/swibrow/github-actions-tui
    description: Terminal UI for GitHub Actions
    license: MIT
    install: |
      bin.install "gha"
    test: |
      assert_match version.to_s, shell_output("#{bin}/gha --version")

changelog:
  use: github-native
